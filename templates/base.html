<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Atlas Report Builder{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand-link" href="{{ url_for('index') }}">
        <img class="logo-img" src="{{ url_for('static', filename='logos/pepper_logo.svg') }}" alt="Pepper">
      </a>
      <span class="topbar-tag">Atlas · Report Builder</span>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>

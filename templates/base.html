<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Atlas Report Builder{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <span class="logo">Pepper&nbsp;<span class="logo-sub">Atlas</span></span>
      <span class="topbar-tag">Report Builder</span>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
